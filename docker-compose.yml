version: '3.8'

services:

  mongo:
    image: mongo:7.0
    container_name: exam-autograder-db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password123
      - MONGO_INITDB_DATABASE=exam_grader
    volumes:
      - mongo_data:/data/db
      - ./mongo-entrypoint/:/docker-entrypoint-initdb.d/
    restart: unless-stopped
    ports:
      - "27017:27017"
    networks:
      - exam-autograder-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  springboot:
    build:
      context: ./ExamAutoGraderService/
      dockerfile: Dockerfile
    container_name: exam-autograder-service
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATA_MONGODB_URI=mongodb://admin:password123@mongo:27017/exam_grader?authSource=admin
      - ML_SERVICE_URL=http://machinelearning:5000
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "9090:9090"
    networks:
      - exam-autograder-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  machinelearning:
    build:
      context: ./ExamAutoGraderProcessor/
      dockerfile: Dockerfile
    container_name: exam-autograder-processor
    restart: unless-stopped
    environment:
      - FLASK_ENV=production
      - GOOGLE_APPLICATION_CREDENTIALS=/app/src/gcloud.json
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "5000:5000"
    networks:
      - exam-autograder-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build:
      context: ./ExamGraderUi/
      dockerfile: Dockerfile
    container_name: exam-autograder-ui
    restart: unless-stopped
    depends_on:
      springboot:
        condition: service_healthy
    environment:
      - API_URL=http://localhost:9090
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "80:80"
    networks:
      - exam-autograder-network

volumes:
  mongo_data:
  uploads:

networks:
  exam-autograder-network:
    driver: bridge
