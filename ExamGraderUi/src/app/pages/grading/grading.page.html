<ion-header>
  <ion-toolbar color="secondary">
    <ion-row>
      <ion-col>
        <img alt="logo" height="40px" src="assets/imgs/logo.png" />
      </ion-col>
      <ion-col>
        <ion-label>{{ 'grading_title' | translate }}</ion-label>
      </ion-col>
    </ion-row>

    <ion-buttons slot="end" *ngIf="searchDivHidden">
      <ion-button (click)="showSearchDiv()">
        <ion-icon slot="icon-only" name="search"></ion-icon>
      </ion-button>
      <ion-button (click)="helpMenu()">
        <ion-icon slot="icon-only" name="help"></ion-icon>
      </ion-button>
      <ion-button (click)="sort()">
        <ion-icon slot="icon-only" name="reorder-four"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-buttons *ngIf="!searchDivHidden">
    <ion-searchbar [(ngModel)]="terms"></ion-searchbar>
    <ion-button (click)="hideSearchDiv()">
      <ion-icon slot="icon-only" name="close"></ion-icon>
    </ion-button>
  </ion-buttons>

  <form [formGroup]="form">
    <ion-list>
      <ion-radio-group formControlName="language" (ionChange)="changeLanguage($event)">
        <ion-row class="ion-padding-horizontal">
          <ion-col>
            <ion-radio value="de">{{ 'de' | translate }}</ion-radio>
          </ion-col>
          <ion-col>
            <ion-radio value="en">{{ 'en' | translate }}</ion-radio>
          </ion-col>
        </ion-row>
      </ion-radio-group>

      <ion-item-sliding
        *ngFor="
          let gradedExam of gradedExams
            | search: terms
            | sort: { property: column, order: order };
          let i = index
        "
      >
        <ion-item>
          {{ gradedExam.exam.course + ' - ' +
          getTranslatedValue(gradedExam.exam.semester) + '' +
          gradedExam.exam.year }}

          <ion-buttons slot="end">
            <ion-button color="danger" (click)="viewGrading(i)">
              <ion-icon slot="icon-only" name="eye"></ion-icon>
            </ion-button>
            <ion-button color="danger" (click)="deleteGrading(i)">
              <ion-icon slot="icon-only" name="trash"></ion-icon>
            </ion-button>
          </ion-buttons>
        </ion-item>
      </ion-item-sliding>
    </ion-list>
  </form>
</ion-content>
