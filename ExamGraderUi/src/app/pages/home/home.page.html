<ion-header>
  <ion-toolbar color="secondary">
    <ion-row>
      <ion-col>
        <img alt="logo" height="40px" src="assets/imgs/logo.png" />
      </ion-col>
      <ion-col>
        <ion-label>{{ 'home_title' | translate }}</ion-label>
      </ion-col>
    </ion-row>

    <ion-buttons slot="end" *ngIf="searchDivHidden">
      <ion-button (click)="searchUnprocessedExams()">
        <ion-icon slot="icon-only" name="search"></ion-icon>
      </ion-button>
      <ion-button (click)="addNewExam()">
        <ion-icon slot="icon-only" name="add"></ion-icon>
      </ion-button>
      <ion-button (click)="helpMenu()">
        <ion-icon slot="icon-only" name="help"></ion-icon>
      </ion-button>
      <ion-button (click)="sort()">
        <ion-icon slot="icon-only" name="reorder-four"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-buttons *ngIf="!searchDivHidden">
    <ion-searchbar [(ngModel)]="terms"></ion-searchbar>
    <ion-button (click)="hideSearchDiv()">
      <ion-icon slot="icon-only" name="close"></ion-icon>
    </ion-button>
  </ion-buttons>

  <p class="ion-text-center" *ngIf="unProcessedExams.length == 0">
    All exams processed
  </p>

  <ion-list>
    <ion-item-sliding
      *ngFor="
        let unProcessedExam of unProcessedExams
          | search: terms
          | sort: { property: column, order: order };
        let i = index
      "
    >
      <ion-item>
        {{ unProcessedExam.course + ' - ' +
        getTranslatedValue(unProcessedExam.semester) + ' ' +
        unProcessedExam.year }}

        <ion-buttons slot="end">
          <ion-button color="danger" (click)="editDetails(i)">
            <ion-icon slot="icon-only" name="create"></ion-icon>
          </ion-button>
          <ion-button color="danger" (click)="deleteExam(i)">
            <ion-icon slot="icon-only" name="trash"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-item>
    </ion-item-sliding>
  </ion-list>
</ion-content>
