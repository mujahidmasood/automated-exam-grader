<ion-header>
  <ion-toolbar>
    <ion-title>{{ 'exam_viewer_title' | translate }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="closePdfViewer()">Close</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <iframe *ngIf="data" [src]="data" height="100%" width="100%"></iframe>
</ion-content>
